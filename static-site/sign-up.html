<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Sign Up | Punch For Purpose</title><link rel="stylesheet" href="assets/styles.css" /></head>
  <body>
    <header class="site-header"><div class="container nav"><a href="index.html" class="logo">PUNCH <span>FOR PURPOSE</span></a><nav class="nav-links"><a href="events.html">Events</a><a href="tickets.html">Tickets</a></nav></div></header>
    <section class="section"><div class="container" style="max-width:760px"><h1>Sign Up</h1><p>Limited spaces available.</p>
      <form data-static-form class="card">
        <div class="split"><input class="field" placeholder="Full Name" required/><input class="field" type="email" placeholder="Email" required/></div>
        <div class="split"><input class="field" placeholder="Phone" required/><input class="field" placeholder="City" required/></div>
        <input class="field" placeholder="Fitness experience" required/>
        <textarea rows="3" placeholder="Why do you want to join?" required></textarea>
        <input class="field" placeholder="Emergency contact" required/>
        <button class="btn primary" type="submit">Pay £50 & Continue</button>
      </form>
    </div></section>
    <footer class="site-footer"><div class="container">© 2026 Punch For Purpose</div></footer>
    <script src="assets/app.js"></script>
  </body>
  </html>
